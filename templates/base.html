<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Taller Mecánico{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-slate-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="text-2xl font-bold text-blue-500">tus<span class="text-white">horas</span></a>
            <ul class="flex space-x-6">
                <li><a href="#" class="hover:text-blue-400 transition">Inicio</a></li>
                <li><a href="#" class="hover:text-blue-400 transition">Servicios</a></li>
                <li><a href="#" class="hover:text-blue-400 transition">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <main class="flex-grow container mx-auto p-6">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-slate-900 text-gray-400 text-center p-4 mt-auto">
        <p>&copy; 2026 tus horas .</p>
    </footer>

</body>
</html>
