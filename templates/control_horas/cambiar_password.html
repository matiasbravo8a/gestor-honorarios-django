{% extends 'base.html' %}

{% block title %}Cambiar Contraseña{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-center text-slate-800 mb-2">Seguridad</h2>
    <p class="text-center text-gray-500 text-sm mb-6">Actualiza tu contraseña de acceso.</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="space-y-4">
            {{ form.as_p }}
        </div>
        
        <div class="mt-6 flex gap-3">
            <a href="{% url 'perfil' %}" class="w-1/3 text-center bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 px-4 rounded-lg transition">
                Cancelar
            </a>
            <button type="submit" class="w-2/3 bg-slate-800 hover:bg-slate-700 text-white font-semibold py-3 px-4 rounded-lg transition">
                Guardar Contraseña
            </button>
        </div>
    </form>
</div>

<style>
    input { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; margin-top: 0.25rem; }
    label { font-size: 0.875rem; font-weight: 600; color: #4b5563; }
    .helptext { font-size: 0.75rem; color: #6b7280; display: block; margin-top: 0.25rem; }
    ul.errorlist { font-size: 0.75rem; color: #ef4444; list-style: none; padding: 0; margin-top: 0.25rem; }
</style>
{% endblock %}
