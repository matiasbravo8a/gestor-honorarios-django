{%extends 'base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">Bienvenido de nuevo</h2>
    
    <form method="POST">
        {% csrf_token %}
        <div class="space-y-4">
            {{ form.as_p }}
        </div>
        
        <button type="submit" class="w-full mt-6 bg-slate-800 hover:bg-slate-700 text-white font-semibold py-3 px-4 rounded-lg transition">
            Entrar al Panel
        </button>
    </form>
    
    <p class="mt-6 text-center text-sm text-gray-500">
        ¿No tienes cuenta? <a href="{% url 'registro' %}" class="text-blue-600 hover:underline">Regístrate aquí</a>
    </p>
</div>

<style>
    input { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; margin-top: 0.25rem; }
    label { font-size: 0.875rem; font-weight: 600; color: #4b5563; }
    .helptext, ul.errorlist { font-size: 0.75rem; color: #ef4444; list-style: none; padding: 0; }
</style>
{% endblock %}
