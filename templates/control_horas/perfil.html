{% extends 'base.html' %}

{% block title %}Mi Perfil{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto mt-8">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="bg-slate-800 px-8 py-6 text-white flex items-center gap-4">
            <div class="h-16 w-16 bg-emerald-500 rounded-full flex items-center justify-center text-2xl font-bold uppercase shadow-inner">
                {{ user.username.0 }} </div>
            <div>
                <h2 class="text-2xl font-bold">{{ user.username }}</h2>
                <p class="text-slate-300 text-sm">Miembro desde: {{ user.date_joined|date:"F Y" }}</p>
            </div>
        </div>
        
        <div class="p-8">
            <h3 class="text-lg font-semibold text-slate-800 border-b pb-2 mb-4">Seguridad y Acceso</h3>
            <div class="flex items-center justify-between bg-gray-50 p-4 rounded-lg border border-gray-100">
                <div>
                    <p class="font-medium text-gray-700">Contraseña</p>
                    <p class="text-sm text-gray-500">Te recomendamos cambiarla regularmente.</p>
                </div>
                <a href="{% url 'cambiar_password' %}" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 py-2 px-4 rounded-md text-sm font-medium transition shadow-sm">
                    Cambiar Contraseña
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
